<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>コンパスカスタム用</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f8ff; color: #333; text-align: center; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { font-size: 24px; color: #333; }
        
        button { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }

        .mode-buttons { display: flex; gap: 10px; margin-bottom: 15px; }
        
        .player-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; text-align: left; }
        .input-group { display: flex; align-items: center; }
        .input-group input { flex-grow: 1; padding: 8px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; width: 100%; box-sizing: border-box;}
        .remove-btn { margin-left: 5px; background-color: #ff6b6b; color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer; font-size: 12px; white-space: nowrap; }
        .add-btn { background-color: #4CAF50; color: white; border: none; padding: 10px 20px; font-size: 14px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; font-weight: bold; }
        
        details.settings-area { margin-bottom: 20px; text-align: left; background: #f9f9f9; padding: 15px; border-radius: 5px; border: 1px solid #ddd; }
        summary { font-weight: bold; cursor: pointer; outline: none; font-size: 16px; color: #333; padding: 5px 0; }
        .map-controls { margin-top: 10px; margin-bottom: 10px; }
        .btn-small { background-color: #777; color: white; border: none; padding: 8px 15px; font-size: 14px; border-radius: 3px; cursor: pointer; margin-right: 5px; }
        
        .checkbox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 14px; margin-top: 10px; }
        .checkbox-grid label { display: flex; align-items: center; cursor: pointer; line-height: 1.3; padding: 5px 0;}
        .checkbox-grid input { margin-right: 8px; flex-shrink: 0; width: 18px; height: 18px; cursor: pointer;}

        .custom-map-area { margin-top: 15px; padding-top: 15px; border-top: 1px dashed #ccc; }
        .custom-map-row { display: flex; align-items: center; margin-bottom: 8px; }

        #errorMessage { color: red; font-weight: bold; font-size: 14px; margin-bottom: 10px; display: none; }

        .action-buttons { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .sub-buttons-container { display: flex; gap: 10px; }
        .btn-main { background-color: #ff4500; color: white; border: none; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.2s; width: 100%;}
        .btn-sub { flex: 1; background-color: #008CBA; color: white; border: none; padding: 12px; font-size: 15px; border-radius: 5px; cursor: pointer; transition: 0.2s;}
        
        .btn-copy { background-color: #333; color: white; border: none; padding: 12px; font-size: 15px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 20px; font-weight: bold; transition: 0.3s;}
        .btn-discord { background-color: #5865F2; color: white; border: none; padding: 12px; font-size: 15px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: bold; transition: 0.3s;}

        @media (hover: hover) and (pointer: fine) {
            .btn-main:hover { background-color: #e03e00; }
            .btn-sub:hover { background-color: #007399; }
            .btn-small:hover { background-color: #555; }
            .btn-copy:hover { background-color: #111; }
            .btn-discord:hover { background-color: #4752C4; }
        }
        
        .result { margin-top: 20px; padding: 15px; background: #f9f9f9; border-radius: 5px; }
        
        .teams-container { display: flex; gap: 10px; justify-content: space-between; margin-bottom: 15px; }
        .team-box { flex: 1; background: #fff; padding: 15px; border-radius: 8px; border: 2px solid; }
        .team-box.blue { border-color: #0066cc; background-color: #eef5ff; }
        .team-box.red { border-color: #cc0000; background-color: #ffeef0; }
        .team-box h3 { margin-top: 0; text-align: center; font-size: 18px; margin-bottom: 10px; }
        .team-blue { color: #0066cc; }
        .team-red { color: #cc0000; }
        .team-box ul { padding-left: 20px; margin: 0; text-align: left; }
        .team-box li { font-weight: bold; margin-bottom: 5px; color: #333; }
        
        .map-result { font-size: 20px; font-weight: bold; color: #2e8b57; padding-top: 15px; text-align: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <h1>🧭 コンパスカスタム用</h1>
    
    <details class="settings-area" style="background-color: #eef2ff; border-color: #c7d2fe;">
        <summary>⚙️ Discord自動送信の設定</summary>
        <div style="margin-top: 10px; font-size: 13px; color: #555;">
            <input type="password" id="webhookUrl" placeholder="https://discord.com/api/webhooks/..." style="width: 100%; padding: 8px; margin-bottom: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px;">
            <button type="button" class="btn-small" style="background-color: #5865F2;" onclick="saveWebhook()">URLを保存</button>
            <button type="button" class="btn-small" style="background-color: #ff6b6b;" onclick="resetWebhook()">リセット</button>
            <span id="webhookStatus" style="color: #2e8b57; font-weight: bold; margin-left: 5px; display: none;">✅ 保存しました</span>
        </div>
    </details>

    <div class="mode-buttons">
        <button type="button" class="btn-small" style="background-color: #f39c12; flex: 1; padding: 10px;" onclick="setMode(4)">2on2用 (4枠)</button>
        <button type="button" class="btn-small" style="background-color: #3498db; flex: 1; padding: 10px;" onclick="setMode(6)">標準 (6枠)</button>
    </div>

    <div id="playerList" class="player-inputs"></div>
    <button type="button" class="add-btn" onclick="addPlayerInput()">＋ 枠を増やす</button>

    <details class="settings-area">
        <summary>🗺️ 抽選するマップを選ぶ（タップで開閉）</summary>
        <div class="map-controls">
            <button type="button" class="btn-small" onclick="toggleAllMaps(true)">すべてON</button>
            <button type="button" class="btn-small" onclick="toggleAllMaps(false)">すべてOFF</button>
        </div>
        <div id="mapCheckboxes" class="checkbox-grid"></div>
        
        <div class="custom-map-area">
            <div id="customMapList"></div>
            <button type="button" class="btn-small" style="background-color: #4CAF50;" onclick="addCustomMap()">＋ 自由枠を追加</button>
        </div>
    </details>

    <div id="errorMessage"></div>

    <div class="action-buttons">
        <button type="button" class="btn-main" onclick="decideBoth()">チーム分け ＆ マップ抽選を同時に行う</button>
        <div class="sub-buttons-container">
            <button type="button" class="btn-sub" onclick="decideTeamOnly()">チーム分けのみ行う</button>
            <button type="button" class="btn-sub" onclick="decideMapOnly()">マップ抽選のみ行う</button>
        </div>
    </div>

    <div id="resultArea" class="result hidden">
        <div id="teamResultArea" class="hidden">
            <div class="teams-container">
                <div class="team-box blue">
                    <h3 class="team-blue">🟦 青チーム</h3>
                    <ul id="blueTeam"></ul>
                </div>
                <div class="team-box red">
                    <h3 class="team-red">🟥 赤チーム</h3>
                    <ul id="redTeam"></ul>
                </div>
            </div>
            <p id="excludedPlayers" style="font-size: 14px; color: #666; font-weight: bold; text-align: center; margin-top: 0;"></p>
        </div>

        <div id="mapResultArea" class="map-result hidden">
            🗺️ マップ:<br><span id="selectedMap" style="display:inline-block; margin-top:5px;"></span>
        </div>
        
        <button type="button" id="sendDiscordBtn" class="btn-discord hidden" onclick="sendToDiscord()">🚀 結果をDiscordに自動送信する</button>
        <button type="button" id="copyBtn" class="btn-copy hidden" onclick="copyToClipboard()">📋 結果をコピーする</button>
    </div>
</div>

<script>
    const mapData = [
        { name: "でらクランクストリート", defaultOn: true },
        { name: "けっこいスターパーク", defaultOn: true },
        { name: "東西たかさん広場", defaultOn: true },
        { name: "グレートウォール", defaultOn: true },
        { name: "立体交差のある風景", defaultOn: true },
        { name: "光と闇のライブステージ", defaultOn: true },
        { name: "妖華帝都ケルパーズの散歩道", defaultOn: true },
        { name: "ちゅら島リゾート", defaultOn: true },
        { name: "って〜！つっぺる工事現場", defaultOn: true },
        { name: "太鼓で祭りだドーン！", defaultOn: true },
        { name: "おいでやす鳥居通り", defaultOn: true },
        { name: "かけだせ！じっぱか城", defaultOn: true },
        { name: "どっひゃぁ〜！なっから遺跡", defaultOn: true },
        { name: "Castle of the Silver Feet", defaultOn: true },
        { name: "Hello :-) irregular World", defaultOn: true },
        { name: "なまらモーモーパーク", defaultOn: true },
        { name: "おっかねぇ！氷焔神域ケイオスブルク", defaultOn: true },
        { name: "バリバリ！てげてげモーターウェイ", defaultOn: true },
        { name: "いこっさ！ダイダイダイナソー博物館", defaultOn: true },
        { name: "【ストヘス区】急襲戦闘区域", defaultOn: false }
    ];

    window.onload = function() {
        const container = document.getElementById('mapCheckboxes');
        mapData.forEach(map => {
            const label = document.createElement('label');
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.className = 'map-checkbox normal-map-checkbox';
            checkbox.value = map.name;
            checkbox.checked = map.defaultOn;
            label.appendChild(checkbox);
            label.appendChild(document.createTextNode(map.name));
            container.appendChild(label);
        });

        for(let i = 0; i < 6; i++) {
            addPlayerInput();
        }

        const savedUrl = localStorage.getItem('compassWebhookUrl');
        if(savedUrl) {
            document.getElementById('webhookUrl').value = savedUrl;
        }
    };

    function saveWebhook() {
        const url = document.getElementById('webhookUrl').value.trim();
        if(url === "") {
            alert("URLが入力されていません！");
            return;
        }
        localStorage.setItem('compassWebhookUrl', url);
        const status = document.getElementById('webhookStatus');
        status.innerText = "✅ 保存しました";
        status.style.color = "#2e8b57";
        status.style.display = 'inline';
        setTimeout(() => { status.style.display = 'none'; }, 2000);
    }

    function resetWebhook() {
        localStorage.removeItem('compassWebhookUrl');
        document.getElementById('webhookUrl').value = '';
        const status = document.getElementById('webhookStatus');
        status.innerText = "🗑️ リセット完了";
        status.style.color = "#cc0000";
        status.style.display = 'inline';
        setTimeout(() => { status.style.display = 'none'; }, 2000);
    }

    function setMode(num) {
        const currentInputs = document.querySelectorAll('.input-group');
        if (currentInputs.length > num) {
            for (let i = currentInputs.length - 1; i >= num; i--) {
                currentInputs[i].remove();
            }
        } else if (currentInputs.length < num) {
            const diff = num - currentInputs.length;
            for (let i = 0; i < diff; i++) {
                addPlayerInput();
            }
        }
        updatePlayerPlaceholders();
        hideError();
    }

    function addPlayerInput() {
        const playerList = document.getElementById('playerList');
        const div = document.createElement('div');
        div.className = 'input-group';
        
        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'playerName';
        input.value = ""; 
        
        const removeBtn = document.createElement('button');
        removeBtn.type = 'button';
        removeBtn.className = 'remove-btn';
        removeBtn.innerText = '削除';
        removeBtn.onclick = function() { 
            if (document.querySelectorAll('.input-group').length <= 4) {
                showError("⚠️ プレイヤー枠は最低4枠必要です！");
                setTimeout(hideError, 2000);
                return;
            }
            playerList.removeChild(div);
            updatePlayerPlaceholders();
        };
        
        div.appendChild(input);
        div.appendChild(removeBtn);
        playerList.appendChild(div);
        updatePlayerPlaceholders();
    }

    function updatePlayerPlaceholders() {
        const inputs = document.querySelectorAll('.playerName');
        inputs.forEach((input, index) => {
            input.placeholder = (index + 1).toString();
        });
    }

    function getValidPlayers() {
        return Array.from(document.querySelectorAll('.playerName')).map(input => input.value.trim()).filter(name => name !== '');
    }

    function addCustomMap() {
        const container = document.getElementById('customMapList');
        const div = document.createElement('div');
        div.className = 'custom-map-row';
        
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.className = 'map-checkbox custom-map-checkbox';
        checkbox.checked = true;
        checkbox.style.width = '18px';
        checkbox.style.height = '18px';
        checkbox.style.marginRight = '8px';
        
        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'custom-map-input';
        input.placeholder = 'マップ名を入力';
        input.style.flexGrow = '1';
        input.style.padding = '6px';
        input.style.border = '1px solid #ccc';
        input.style.borderRadius = '3px';

        const removeBtn = document.createElement('button');
        removeBtn.type = 'button';
        removeBtn.innerText = '✕';
        removeBtn.style.marginLeft = '8px';
        removeBtn.style.padding = '6px 12px';
        removeBtn.style.border = 'none';
        removeBtn.style.backgroundColor = '#ccc';
        removeBtn.style.borderRadius = '3px';
        removeBtn.style.cursor = 'pointer';
        removeBtn.onclick = function() { container.removeChild(div); };

        div.appendChild(checkbox);
        div.appendChild(input);
        div.appendChild(removeBtn);
        container.appendChild(div);
    }

    function getActiveMaps() {
        let active = [];
        document.querySelectorAll('.normal-map-checkbox:checked').forEach(cb => {
            active.push(cb.value);
        });
        document.querySelectorAll('.custom-map-checkbox:checked').forEach(cb => {
            const inputVal = cb.nextElementSibling.value.trim();
            if(inputVal !== '') active.push(inputVal);
        });
        return active;
    }

    function toggleAllMaps(state) {
        document.querySelectorAll('.map-checkbox').forEach(cb => cb.checked = state);
    }

    function shuffleArray(array) {
        const arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function showError(message) {
        const errEl = document.getElementById('errorMessage');
        errEl.innerText = message;
        errEl.style.display = 'block';
    }
    
    function hideError() {
        document.getElementById('errorMessage').style.display = 'none';
    }

    function generateTeam() {
        hideError();
        const players = getValidPlayers();
        
        if (players.length < 4) {
            showError("⚠️ プレイヤー名は最低4人分入力してください！(現在: " + players.length + "人)");
            return false;
        }

        const shuffled = shuffleArray(players);
        const matchCount = Math.min(players.length, 6);
        const selectedPlayers = shuffled.slice(0, matchCount);
        const excluded = shuffled.slice(matchCount);

        const half = Math.ceil(selectedPlayers.length / 2);
        const blueTeam = selectedPlayers.slice(0, half);
        const redTeam = selectedPlayers.slice(half);

        document.getElementById('blueTeam').innerHTML = blueTeam.map(name => `<li>${name}</li>`).join('');
        document.getElementById('redTeam').innerHTML = redTeam.map(name => `<li>${name}</li>`).join('');
        
        const excludedEl = document.getElementById('excludedPlayers');
        excludedEl.innerText = excluded.length > 0 ? "👀 観戦/お休み: " + excluded.join(" , ") : "";
        return true;
    }

    function generateMap() {
        hideError();
        const activeMaps = getActiveMaps();
        if (activeMaps.length === 0) {
            showError("⚠️ マップが1つも選択されていません（自由枠の場合は文字を入力してください）");
            return false;
        }
        const randomMap = activeMaps[Math.floor(Math.random() * activeMaps.length)];
        document.getElementById('selectedMap').innerText = randomMap;
        return true;
    }

    function updateDisplay() {
        document.getElementById('resultArea').classList.remove('hidden');
        document.getElementById('sendDiscordBtn').classList.remove('hidden'); 
        document.getElementById('copyBtn').classList.remove('hidden'); 
        
        const teamArea = document.getElementById('teamResultArea');
        const mapArea = document.getElementById('mapResultArea');
        
        if (!teamArea.classList.contains('hidden') && !mapArea.classList.contains('hidden')) {
            mapArea.style.borderTop = "2px dashed #ccc";
        } else {
            mapArea.style.borderTop = "none";
        }
    }

    function decideBoth() {
        hideError();
        if (getActiveMaps().length === 0) { showError("⚠️ マップが1つも選択されていません！"); return; }
        if (!generateTeam()) return;
        generateMap();
        document.getElementById('teamResultArea').classList.remove('hidden');
        document.getElementById('mapResultArea').classList.remove('hidden');
        updateDisplay();
    }

    function decideTeamOnly() {
        if (!generateTeam()) return;
        document.getElementById('teamResultArea').classList.remove('hidden');
        updateDisplay();
    }

    function decideMapOnly() {
        if (!generateMap()) return;
        document.getElementById('mapResultArea').classList.remove('hidden');
        updateDisplay();
    }

    function createResultText() {
        let text = "【カスタムマッチ結果】\n";
        const teamArea = document.getElementById('teamResultArea');
        const mapArea = document.getElementById('mapResultArea');

        if (!teamArea.classList.contains('hidden')) {
            const bluePlayers = Array.from(document.getElementById('blueTeam').children).map(li => li.innerText).join('、');
            const redPlayers = Array.from(document.getElementById('redTeam').children).map(li => li.innerText).join('、');
            const excluded = document.getElementById('excludedPlayers').innerText;
            text += `🟦 青チーム: ${bluePlayers}\n`;
            text += `🟥 赤チーム: ${redPlayers}\n`;
            if (excluded !== "") text += `${excluded}\n`;
        }

        if (!mapArea.classList.contains('hidden')) {
            const mapName = document.getElementById('selectedMap').innerText;
            text += `🗺️ マップ: ${mapName}\n`;
        }
        return text;
    }

    function sendToDiscord() {
        const webhookUrl = localStorage.getItem('compassWebhookUrl');
        if(!webhookUrl || webhookUrl === "") {
            alert("⚠️ 上の「⚙️ Discord自動送信の設定」からWebhook URLを保存してください！");
            return;
        }

        const textToSend = createResultText();
        const btn = document.getElementById('sendDiscordBtn');
        const originalText = btn.innerText;
        btn.innerText = "送信中...";

        fetch(webhookUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content: textToSend })
        })
        .then(response => {
            if(response.ok) {
                btn.innerText = "✅ 送信成功！Discordを確認してください";
                btn.style.backgroundColor = "#4CAF50";
            } else {
                alert("送信に失敗しました。Webhook URLが間違っていないか確認してください。");
                btn.innerText = originalText;
            }
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.backgroundColor = "";
            }, 3000);
        })
        .catch(err => {
            alert("通信エラーが発生しました。");
            btn.innerText = originalText;
        });
    }

    function copyToClipboard() {
        const textToCopy = createResultText();
        navigator.clipboard.writeText(textToCopy).then(() => {
            const btn = document.getElementById('copyBtn');
            const originalText = btn.innerText;
            btn.innerText = "✅ コピーしました！";
            btn.style.backgroundColor = "#4CAF50";
            setTimeout(() => { btn.innerText = originalText; btn.style.backgroundColor = ""; }, 2000);
        }).catch(err => {
            alert("コピーに失敗しました。");
        });
    }
</script>

</body>
</html>
