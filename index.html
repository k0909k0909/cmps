<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>コンパスカスタム用</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f8ff; color: #333; text-align: center; padding: 10px; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        
        .header-wrapper { display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 10px; }
        .header-wrapper h1 { margin: 0; font-size: 22px; color: #333; }
        .btn-patch-icon { position: absolute; right: 0; background: none; border: none; font-size: 24px; cursor: pointer; transition: 0.2s; padding: 5px; }

        /* タブのデザイン */
        .tab-menu { display: flex; border-bottom: 2px solid #ddd; margin-bottom: 20px; }
        .tab-btn { padding: 12px; cursor: pointer; border: none; background: #f8f8f8; font-weight: bold; color: #666; transition: 0.3s; }
        #tabMatch { flex: 3; }
        #tabStats { flex: 1; border-left: 1px solid #ddd; }
        .tab-btn.active { background: #fff; color: #ff4500; border-bottom: 3px solid #ff4500; margin-bottom: -2px; }

        button { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }

        .player-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; text-align: left; }
        .input-group { display: flex; align-items: center; }
        .input-group input { flex-grow: 1; padding: 8px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; width: 100%; box-sizing: border-box;}
        .remove-btn { margin-left: 5px; background-color: #ff6b6b; color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .add-btn { background-color: #4CAF50; color: white; border: none; padding: 10px; font-size: 14px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; font-weight: bold; width: 100%; }
        
        details.settings-area { margin-bottom: 20px; text-align: left; background: #f9f9f9; padding: 12px; border-radius: 5px; border: 1px solid #ddd; }
        summary { font-weight: bold; cursor: pointer; outline: none; font-size: 15px; padding: 5px 0; }
        .btn-small { background-color: #777; color: white; border: none; padding: 8px 12px; font-size: 13px; border-radius: 3px; cursor: pointer; margin-right: 5px; }
        
        /* マップ選択エリアのデザイン調整 */
        .checkbox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 13px; margin-top: 10px; }
        /* 文字が長くて折り返されても綺麗に見えるように flex-start に変更 */
        .checkbox-grid label { display: flex; align-items: flex-start; cursor: pointer; padding: 3px 0; line-height: 1.4; }
        .checkbox-grid input { margin-right: 8px; width: 18px; height: 18px; flex-shrink: 0; margin-top: 0; }

        #errorMessage { color: red; font-weight: bold; font-size: 14px; margin-bottom: 10px; display: none; }

        .action-buttons { display: flex; flex-direction: column; gap: 8px; }
        .sub-buttons-container { display: flex; gap: 8px; }
        .btn-main { background-color: #ff4500; color: white; border: none; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer; width: 100%; }
        .btn-gray { background-color: #a0a0a0; color: white; border: none; padding: 10px; font-size: 15px; font-weight: bold; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 5px;}
        .btn-sub { flex: 1; background-color: #008CBA; color: white; border: none; padding: 12px; font-size: 14px; border-radius: 5px; cursor: pointer;}
        
        .result { margin-top: 20px; padding: 15px; background: #f9f9f9; border-radius: 5px; border: 1px solid #eee; }
        .teams-container { display: flex; gap: 8px; justify-content: space-between; margin-bottom: 15px; }
        .team-box { flex: 1; background: #fff; padding: 10px; border-radius: 8px; border: 2px solid; }
        .team-box.blue { border-color: #0066cc; background-color: #eef5ff; }
        .team-box.red { border-color: #cc0000; background-color: #ffeef0; }
        .team-box h3 { margin: 0 0 10px 0; font-size: 16px; }
        .team-box ul { padding-left: 18px; margin: 0; text-align: left; font-weight: bold; }
        
        .win-record-buttons { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-win-blue { flex: 1; background-color: #0066cc; color: white; border: none; padding: 12px; border-radius: 5px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s;}
        .btn-win-red { flex: 1; background-color: #cc0000; color: white; border: none; padding: 12px; border-radius: 5px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s;}
        .btn-win-blue:active, .btn-win-red:active { transform: scale(0.95); }

        .btn-copy { background-color: #333; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 8px; }
        .btn-discord { background-color: #5865F2; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }

        .stats-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        .stats-table th, .stats-table td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        .stats-table th { background-color: #f2f2f2; cursor: pointer; user-select: none; transition: 0.2s; }
        .stats-table th:hover { background-color: #e0e0e0; }
        .stats-table tr:nth-child(even) { background-color: #fafafa; }

        .history-list { text-align: left; font-size: 13px; max-height: 250px; overflow-y: auto; background: #fff; padding: 10px; border: 1px solid #ddd; border-radius: 5px; margin-top: 10px;}
        .history-item { position: relative; border-bottom: 1px dashed #ccc; padding: 10px 45px 10px 0; line-height: 1.5; }
        .history-item:last-child { border-bottom: none; }
        .btn-undo { position: absolute; right: 0; top: 10px; background-color: #ff6b6b; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .btn-undo:hover { background-color: #e05e5e; }

        .custom-map-area { margin-top: 15px; padding-top: 15px; border-top: 1px dashed #ccc; }
        .custom-map-row { display: flex; align-items: center; margin-bottom: 8px; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 200; justify-content: center; align-items: center; }
        .modal-content { background: #fff; width: 90%; max-width: 500px; max-height: 80vh; border-radius: 10px; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; text-align: left; position: relative; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; padding-bottom: 10px; margin-bottom: 15px; }
        .modal-body { overflow-y: auto; font-size: 14px; line-height: 1.6; white-space: pre-wrap; flex-grow: 1; }
        .close-modal { background: none; border: none; font-size: 28px; cursor: pointer; color: #666; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-wrapper">
        <h1>🧭 コンパスカスタム用</h1>
        <button type="button" class="btn-patch-icon" onclick="openPatchNotes()">📄</button>
    </div>

    <div class="tab-menu">
        <div id="tabMatch" class="tab-btn active" onclick="switchTab('match')">抽選</div>
        <div id="tabStats" class="tab-btn" onclick="switchTab('stats')">戦績</div>
    </div>

    <div id="contentMatch">
        <details class="settings-area" style="background-color: #eef2ff; border-color: #c7d2fe;">
            <summary>⚙️ Discord自動送信の設定</summary>
            <div style="margin-top: 10px; font-size: 13px;">
                <input type="password" id="webhookUrl" placeholder="Webhook URLを入力" style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px;">
                <button type="button" class="btn-small" style="background-color: #5865F2;" onclick="saveWebhook()">保存</button>
                <button type="button" class="btn-small" style="background-color: #ff6b6b;" onclick="resetWebhook()">消去</button>
                <span id="webhookStatus" style="color: #2e8b57; font-weight: bold; display: none;">✅</span>
            </div>
        </details>

        <div id="playerList" class="player-inputs">
            <div class="input-group"><input type="text" class="playerName" placeholder="1"><button type="button" class="remove-btn" onclick="removePlayerInput(this)">✕</button></div>
            <div class="input-group"><input type="text" class="playerName" placeholder="2"><button type="button" class="remove-btn" onclick="removePlayerInput(this)">✕</button></div>
            <div class="input-group"><input type="text" class="playerName" placeholder="3"><button type="button" class="remove-btn" onclick="removePlayerInput(this)">✕</button></div>
            <div class="input-group"><input type="text" class="playerName" placeholder="4"><button type="button" class="remove-btn" onclick="removePlayerInput(this)">✕</button></div>
            <div class="input-group"><input type="text" class="playerName" placeholder="5"><button type="button" class="remove-btn" onclick="removePlayerInput(this)">✕</button></div>
            <div class="input-group"><input type="text" class="playerName" placeholder="6"><button type="button" class="remove-btn" onclick="removePlayerInput(this)">✕</button></div>
        </div>
        <button type="button" class="add-btn" onclick="addPlayerInput()">＋ 枠を増やす</button>

        <details class="settings-area">
            <summary>🗺️ 抽選するマップを選ぶ</summary>
            <div class="map-controls">
                <button type="button" class="btn-small" onclick="toggleAllMaps(true)">全ON</button>
                <button type="button" class="btn-small" onclick="toggleAllMaps(false)">全OFF</button>
            </div>
            
            <div id="mapCheckboxes" class="checkbox-grid">
                <label><input type="checkbox" class="map-checkbox normal-map-checkbox" value="でらクランクストリート" checked>でらクランクストリート</label>
                <label><input type="checkbox" class="map-checkbox normal-map-checkbox" value="けっこいスターパーク" checked>けっこいスターパーク</label>
                <label><input type="checkbox" class="map-checkbox normal-map-checkbox" value="東西たかさん広場" checked>東西たかさん広場</label>
                <label><input type="checkbox" class="map-checkbox normal-map-checkbox" value="グレートウォール" checked>グレートウォール</label>
                <label><input type="checkbox" class="map-checkbox normal-map-checkbox" value="立体交差のある風景" checked>立体交差のある風景</label>
                <label><input type="checkbox" class="map-checkbox normal-map-checkbox" value="光と闇のライブステージ" checked>光と闇のライブステージ</label>
                <label><input type="checkbox" class="map-checkbox normal-map-checkbox" value="妖華帝都ケルパーズの散歩道" checked>妖華帝都ケルパーズの散歩道</label>
                <label><input type="checkbox" class="map-checkbox normal-map-checkbox" value="ちゅら島リゾート" checked>ちゅら島リゾート</label>
                <label><input type="checkbox" class="map-checkbox normal-map-checkbox" value="って〜！つっぺる工事現場" checked>って〜！つっぺる工事現場</label>
                <label><input type="checkbox" class="map-checkbox normal-map-checkbox" value="太鼓で祭りだドーン！" checked>太鼓で祭りだドーン！</label>
                <label><input type="checkbox" class="map-checkbox normal-map-checkbox" value="おいでやす鳥居通り" checked>おいでやす鳥居通り</label>
                <label><input type="checkbox" class="map-checkbox normal-map-checkbox" value="かけだせ！じっぱか城" checked>かけだせ！じっぱか城</label>
                <label><input type="checkbox" class="map-checkbox normal-map-checkbox" value="どっひゃぁ〜！なっから遺跡" checked>どっひゃぁ〜！なっから遺跡</label>
                <label><input type="checkbox" class="map-checkbox normal-map-checkbox" value="Castle of the Silver Feet" checked>Castle of the Silver Feet</label>
                <label><input type="checkbox" class="map-checkbox normal-map-checkbox" value="Hello :-) irregular World" checked>Hello :-) irregular World</label>
                <label><input type="checkbox" class="map-checkbox normal-map-checkbox" value="なまらモーモーパーク" checked>なまらモーモーパーク</label>
                <label><input type="checkbox" class="map-checkbox normal-map-checkbox" value="おっかねぇ！氷焔神域ケイオスブルク" checked>おっかねぇ！氷焔神域ケイオスブルク</label>
                <label><input type="checkbox" class="map-checkbox normal-map-checkbox" value="バリバリ！てげてげモーターウェイ" checked>バリバリ！てげてげモーターウェイ</label>
                <label><input type="checkbox" class="map-checkbox normal-map-checkbox" value="いこっさ！ダイダイダイナソー博物館" checked>いこっさ！ダイダイダイナソー博物館</label>
                <label><input type="checkbox" class="map-checkbox normal-map-checkbox" value="【ストヘス区】急襲戦闘区域">【ストヘス区】急襲戦闘区域</label>
            </div>
            
            <div class="custom-map-area">
                <div id="customMapList"></div>
                <button type="button" class="btn-small" style="background-color: #4CAF50; margin-top:10px;" onclick="addCustomMap()">＋ 自由枠を追加</button>
            </div>
        </details>

        <div id="errorMessage"></div>

        <div class="action-buttons">
            <button type="button" class="btn-main" onclick="decideBoth(3)">チーム分け ＆ マップ抽選</button>
            <div class="sub-buttons-container">
                <button type="button" class="btn-sub" onclick="decideTeamOnly(3)">チームのみ</button>
                <button type="button" class="btn-sub" onclick="decideMapOnly()">マップのみ</button>
            </div>
            <button type="button" class="btn-gray" onclick="decideTeamOnly(2)">2on2で抽選</button>
        </div>

        <div id="resultArea" class="result hidden">
            <div id="teamResultArea" class="hidden">
                <div class="teams-container">
                    <div class="team-box blue">
                        <h3 class="team-blue">🟦 青</h3>
                        <ul id="blueTeam"></ul>
                    </div>
                    <div class="team-box red">
                        <h3 class="team-red">🟥 赤</h3>
                        <ul id="redTeam"></ul>
                    </div>
                </div>
                <div id="recordControl" class="win-record-buttons hidden">
                    <button class="btn-win-blue" onclick="recordWin('blue', this)">🟦 勝ち</button>
                    <button class="btn-win-red" onclick="recordWin('red', this)">🟥 勝ち</button>
                </div>
                <p id="excludedPlayers" style="font-size: 13px; color: #666; font-weight: bold;"></p>
            </div>
            <div id="mapResultArea" class="map-result hidden">
                🗺️ マップ: <span id="selectedMap"></span>
            </div>
            <button type="button" id="copyBtn" class="btn-copy hidden" onclick="copyToClipboard()">📋 結果をコピー</button>
            <button type="button" id="sendDiscordBtn" class="btn-discord hidden" onclick="sendToDiscord()">🚀 Discordに送信</button>
        </div>
    </div>

    <div id="contentStats" class="hidden">
        <h3>📊 プレイヤー勝率</h3>
        <div style="overflow-x: auto;">
            <table class="stats-table">
                <thead>
                    <tr>
                        <th id="th-name" onclick="setSort('name')">名前</th>
                        <th id="th-win" onclick="setSort('win')">勝 ▼</th>
                        <th id="th-loss" onclick="setSort('loss')">負</th>
                        <th id="th-rate" onclick="setSort('rate')">勝率</th>
                    </tr>
                </thead>
                <tbody id="statsTableBody"></tbody>
            </table>
        </div>
        
        <h3 style="margin-top: 30px;">📜 試合履歴</h3>
        <div id="matchHistoryList" class="history-list"></div>

        <button class="btn-small" style="background-color: #ff6b6b; margin-top: 20px;" onclick="clearStats()">すべてのデータを取り消す</button>
    </div>
</div>

<div id="patchNoteModal" class="modal-overlay" onclick="closePatchNotes(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h2>📄 パッチノート</h2>
            <button class="close-modal" onclick="closePatchNotes()">&times;</button>
        </div>
        <div id="patchNoteBody" class="modal-body"></div>
    </div>
</div>

<script>
    let previousExcluded = [];
    let currentMatchPlayers = { blue: [], red: [] };
    let currentSort = { key: 'win', desc: true };

    window.onload = function() {
        const savedUrl = localStorage.getItem('compassWebhookUrl');
        if(savedUrl) document.getElementById('webhookUrl').value = savedUrl;
        updatePlayerPlaceholders();
        renderStats();
    };

    function switchTab(tab) {
        document.getElementById('contentMatch').classList.toggle('hidden', tab !== 'match');
        document.getElementById('contentStats').classList.toggle('hidden', tab !== 'stats');
        document.getElementById('tabMatch').classList.toggle('active', tab === 'match');
        document.getElementById('tabStats').classList.toggle('active', tab === 'stats');
        if(tab === 'stats') renderStats();
    }

    function getStats() {
        return JSON.parse(localStorage.getItem('compassPlayerStats') || '{}');
    }

    function getHistory() {
        return JSON.parse(localStorage.getItem('compassMatchHistory') || '[]');
    }

    function recordWin(winner, btn) {
        const stats = getStats();
        const winningTeam = winner === 'blue' ? currentMatchPlayers.blue : currentMatchPlayers.red;
        const losingTeam = winner === 'blue' ? currentMatchPlayers.red : currentMatchPlayers.blue;

        winningTeam.forEach(name => {
            if(!stats[name]) stats[name] = { win: 0, loss: 0 };
            stats[name].win++;
        });
        losingTeam.forEach(name => {
            if(!stats[name]) stats[name] = { win: 0, loss: 0 };
            stats[name].loss++;
        });
        localStorage.setItem('compassPlayerStats', JSON.stringify(stats));

        const history = getHistory();
        history.push({
            blue: currentMatchPlayers.blue,
            red: currentMatchPlayers.red,
            winner: winner
        });
        localStorage.setItem('compassMatchHistory', JSON.stringify(history));

        const originalText = btn.innerText;
        btn.innerText = "✅ 記録";
        setTimeout(() => { btn.innerText = originalText; }, 1000);
    }

    function deleteMatchHistory(index) {
        if(!confirm("各試合の場合 取り消してもよいですか？")) return;

        const history = getHistory();
        const stats = getStats();
        
        if (index < 0 || index >= history.length) return;

        const match = history[index];
        const winningTeam = match.winner === 'blue' ? match.blue : match.red;
        const losingTeam = match.winner === 'blue' ? match.red : match.blue;

        winningTeam.forEach(name => {
            if(stats[name] && stats[name].win > 0) stats[name].win--;
        });
        losingTeam.forEach(name => {
            if(stats[name] && stats[name].loss > 0) stats[name].loss--;
        });

        history.splice(index, 1);

        localStorage.setItem('compassPlayerStats', JSON.stringify(stats));
        localStorage.setItem('compassMatchHistory', JSON.stringify(history));
        
        renderStats();
    }

    function setSort(key) {
        if (currentSort.key === key) {
            currentSort.desc = !currentSort.desc;
        } else {
            currentSort.key = key;
            currentSort.desc = true;
        }
        renderStats();
    }

    function renderStats() {
        const stats = getStats();
        const tbody = document.getElementById('statsTableBody');
        tbody.innerHTML = '';
        
        let statsArray = Object.keys(stats).map(name => {
            const p = stats[name];
            const total = p.win + p.loss;
            const rate = total === 0 ? 0 : (p.win / total) * 100;
            return {
                name: name,
                win: p.win,
                loss: p.loss,
                rate: rate,
                displayRate: rate.toFixed(1)
            };
        });

        statsArray.sort((a, b) => {
            let valA = a[currentSort.key];
            let valB = b[currentSort.key];

            if (currentSort.key === 'name') {
                return currentSort.desc ? b.name.localeCompare(a.name) : a.name.localeCompare(b.name);
            }

            if (valA < valB) return currentSort.desc ? 1 : -1;
            if (valA > valB) return currentSort.desc ? -1 : 1;
            return 0;
        });

        document.getElementById('th-name').innerText = "名前" + (currentSort.key === 'name' ? (currentSort.desc ? " ▼" : " ▲") : "");
        document.getElementById('th-win').innerText = "勝" + (currentSort.key === 'win' ? (currentSort.desc ? " ▼" : " ▲") : "");
        document.getElementById('th-loss').innerText = "負" + (currentSort.key === 'loss' ? (currentSort.desc ? " ▼" : " ▲") : "");
        document.getElementById('th-rate').innerText = "勝率" + (currentSort.key === 'rate' ? (currentSort.desc ? " ▼" : " ▲") : "");

        if(statsArray.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4">データがありません</td></tr>';
        } else {
            statsArray.forEach(p => {
                tbody.innerHTML += `<tr>
                    <td>${p.name}</td>
                    <td>${p.win}</td>
                    <td>${p.loss}</td>
                    <td>${p.displayRate}%</td>
                </tr>`;
            });
        }

        const history = getHistory();
        const historyList = document.getElementById('matchHistoryList');
        historyList.innerHTML = '';

        if(history.length === 0) {
            historyList.innerHTML = '<div style="text-align:center; color:#999; padding: 10px;">履歴がありません</div>';
        } else {
            [...history].reverse().forEach((match, reversedIndex) => {
                const originalIndex = history.length - 1 - reversedIndex;
                const winIcon = match.winner === 'blue' ? '🟦 青' : '🟥 赤';
                const blueText = match.blue.join('、');
                const redText = match.red.join('、');

                historyList.innerHTML += `
                    <div class="history-item">
                        <button class="btn-undo" onclick="deleteMatchHistory(${originalIndex})">取消</button>
                        <b>👑 勝者: ${winIcon}</b><br>
                        🟦 ${blueText}<br>
                        🟥 ${redText}
                    </div>
                `;
            });
        }
    }

    function clearStats() {
        if(confirm("全てのデータを取り消してもよいですか？")) {
            localStorage.removeItem('compassPlayerStats');
            localStorage.removeItem('compassMatchHistory');
            renderStats();
        }
    }

    function removePlayerInput(btn) {
        if (document.querySelectorAll('.input-group').length <= 4) return;
        btn.parentNode.remove();
        updatePlayerPlaceholders();
    }

    function addPlayerInput() {
        const div = document.createElement('div');
        div.className = 'input-group';
        div.innerHTML = `<input type="text" class="playerName" value=""><button type="button" class="remove-btn" onclick="removePlayerInput(this)">✕</button>`;
        document.getElementById('playerList').appendChild(div);
        updatePlayerPlaceholders();
    }

    function updatePlayerPlaceholders() {
        document.querySelectorAll('.playerName').forEach((input, index) => {
            input.placeholder = (index + 1).toString();
        });
    }

    function getValidPlayers() {
        return Array.from(document.querySelectorAll('.playerName')).map(input => input.value.trim()).filter(name => name !== '');
    }

    function shuffleArray(array) {
        const arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function generateTeam(teamSize) {
        document.getElementById('errorMessage').style.display = 'none';
        const players = getValidPlayers();
        if (players.length < teamSize * 2) {
            document.getElementById('errorMessage').innerText = `⚠️ 最低${teamSize * 2}人必要です`;
            document.getElementById('errorMessage').style.display = 'block';
            return false;
        }

        let pool = shuffleArray(players);
        let playing = [];

        let guaranteed = pool.filter(p => previousExcluded.includes(p));
        let others = pool.filter(p => !previousExcluded.includes(p));
        playing = guaranteed.concat(others).slice(0, teamSize * 2);
        
        let shuffledPlaying = shuffleArray(playing);
        currentMatchPlayers.blue = shuffledPlaying.slice(0, teamSize);
        currentMatchPlayers.red = shuffledPlaying.slice(teamSize, teamSize * 2);
        previousExcluded = players.filter(p => !playing.includes(p));

        document.getElementById('blueTeam').innerHTML = currentMatchPlayers.blue.map(n => `<li>${n}</li>`).join('');
        document.getElementById('redTeam').innerHTML = currentMatchPlayers.red.map(n => `<li>${n}</li>`).join('');
        document.getElementById('excludedPlayers').innerText = previousExcluded.length > 0 ? "👀 観戦: " + previousExcluded.join(" , ") : "";
        
        document.getElementById('recordControl').classList.remove('hidden');
        return true;
    }

    function decideBoth(size) {
        if(!generateTeam(size)) return;
        const activeMaps = Array.from(document.querySelectorAll('.map-checkbox:checked')).map(cb => cb.value);
        document.querySelectorAll('.custom-map-input').forEach(input => {
            if(input.value.trim() !== "" && input.previousElementSibling.checked) activeMaps.push(input.value.trim());
        });
        if(activeMaps.length === 0) return;
        document.getElementById('selectedMap').innerText = activeMaps[Math.floor(Math.random() * activeMaps.length)];
        document.getElementById('teamResultArea').classList.remove('hidden');
        document.getElementById('mapResultArea').classList.remove('hidden');
        updateDisplay();
    }

    function decideTeamOnly(size) {
        if(!generateTeam(size)) return;
        document.getElementById('teamResultArea').classList.remove('hidden');
        updateDisplay();
    }

    function decideMapOnly() {
        const activeMaps = Array.from(document.querySelectorAll('.map-checkbox:checked')).map(cb => cb.value);
        if(activeMaps.length === 0) return;
        document.getElementById('selectedMap').innerText = activeMaps[Math.floor(Math.random() * activeMaps.length)];
        document.getElementById('mapResultArea').classList.remove('hidden');
        updateDisplay();
    }

    function updateDisplay() {
        document.getElementById('resultArea').classList.remove('hidden');
        document.getElementById('copyBtn').classList.remove('hidden');
        document.getElementById('sendDiscordBtn').classList.remove('hidden');
    }

    function addCustomMap() {
        const div = document.createElement('div');
        div.className = 'custom-map-row';
        div.innerHTML = `<input type="checkbox" checked style="width:18px;height:18px;margin-right:8px;"><input type="text" class="custom-map-input" placeholder="自由枠マップ" style="flex:1;padding:5px;"><button type="button" onclick="this.parentNode.remove()" style="margin-left:5px;">✕</button>`;
        document.getElementById('customMapList').appendChild(div);
    }

    function toggleAllMaps(state) {
        document.querySelectorAll('.map-checkbox').forEach(cb => cb.checked = state);
    }

    function saveWebhook() { localStorage.setItem('compassWebhookUrl', document.getElementById('webhookUrl').value.trim()); document.getElementById('webhookStatus').style.display='inline'; setTimeout(()=>document.getElementById('webhookStatus').style.display='none', 2000); }
    function resetWebhook() { localStorage.removeItem('compassWebhookUrl'); document.getElementById('webhookUrl').value=''; }

    function createResultText() {
        let text = "【チーム分け】\n";
        if(!document.getElementById('teamResultArea').classList.contains('hidden')) {
            text += `🟦 青: ${currentMatchPlayers.blue.join('、')}\n🟥 赤: ${currentMatchPlayers.red.join('、')}\n`;
            if(previousExcluded.length > 0) text += `👀 観戦: ${previousExcluded.join('、')}\n`;
        }
        if(!document.getElementById('mapResultArea').classList.contains('hidden')) {
            text += `🗺️ マップ: ${document.getElementById('selectedMap').innerText}`;
        }
        return text;
    }

    function copyToClipboard() { navigator.clipboard.writeText(createResultText()); alert("コピーしました！"); }

    function sendToDiscord() {
        const url = localStorage.getItem('compassWebhookUrl');
        if(!url) return alert("URLを設定してください");
        fetch(url, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({content: createResultText()}) })
        .then(res => { if(res.ok) alert("送信しました！"); });
    }

    function openPatchNotes() {
        const modal = document.getElementById('patchNoteModal');
        modal.style.display = 'flex';
        fetch('patchnotes.txt?' + Date.now()).then(res => res.text()).then(text => document.getElementById('patchNoteBody').innerText = text).catch(() => document.getElementById('patchNoteBody').innerText = "");
    }
    function closePatchNotes() { document.getElementById('patchNoteModal').style.display = 'none'; }
</script>

</body>
</html>
